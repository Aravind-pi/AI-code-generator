<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>AI News</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">AI Landscape</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" href="/news">News</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <h2 class="mb-4">Latest AI News</h2>
        
        <div class="row">
            <div class="col-md-8">
                <div class="card mb-4" th:each="news : ${newsItems}">
                    <div class="card-body">
                        <h5 class="card-title" th:text="${news.title}">News Title</h5>
                        <p class="card-text" th:text="${news.description}">News Description</p>
                        <div class="text-muted">
                            <small th:text="${news.date}">Date</small> - 
                            <small th:text="${news.source}">Source</small>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="col-md-4">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">AI Timeline</h5>
                        <div class="timeline">
                            <div class="timeline-item">
                                <div class="timeline-date">2025</div>
                                <div class="timeline-content">Quantum AI Integration</div>
                            </div>
                            <div class="timeline-item">
                                <div class="timeline-date">2024</div>
                                <div class="timeline-content">GPT-4 Advanced Release</div>
                            </div>
                            <div class="timeline-item">
                                <div class="timeline-date">2023</div>
                                <div class="timeline-content">AI in Healthcare Revolution</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
